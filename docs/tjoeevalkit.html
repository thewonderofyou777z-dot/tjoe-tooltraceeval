  <h1>ToolTraceEval 是历史名称</h1>
  <p>当前推荐名称是 <strong>TjoeReviewKit</strong>。</p>
  <p>TjoeReviewKit 是 tjoe 的本地离线工作流复盘检查工具包，用来检查已准备好的样例、规则、回答和报告是否可审核；它不运行任务、不联网、不接管工具调用、不采集生产日志，也不是线上平台。</p>
  <p>不要根据旧名称推断运行时采集、SDK、Agent 执行、SaaS、dashboard、portal、online API 或自动裁判引擎。</p>
  <p><a href="https://thewonderofyou777z-dot.github.io/tjoe-reviewkit/tjoereviewkit.html">查看 TjoeReviewKit 权威页面</a></p>
